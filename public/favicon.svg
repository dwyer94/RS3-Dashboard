<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#070b11"/>
  <!-- Gold border -->
  <rect x="3" y="3" width="26" height="26" fill="none" stroke="#c8923a" stroke-width="1.2"/>
  <!-- Bottom-left corner mark -->
  <path d="M3 22 L3 29 L10 29" fill="none" stroke="#c8923a" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Bottom-right corner mark -->
  <path d="M29 22 L29 29 L22 29" fill="none" stroke="#c8923a" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Raidho rune ᚱ as SVG path, centered -->
  <!-- Vertical staff -->
  <line x1="11" y1="8" x2="11" y2="24" stroke="#c8923a" stroke-width="2" stroke-linecap="round"/>
  <!-- Upper bow (right side) -->
  <path d="M11 8 Q20 8 20 12.5 Q20 17 11 17" fill="none" stroke="#c8923a" stroke-width="2" stroke-linecap="round"/>
  <!-- Lower leg diagonal -->
  <line x1="11" y1="17" x2="21" y2="24" stroke="#c8923a" stroke-width="2" stroke-linecap="round"/>
</svg>
